services:
  - type: web
    name: enablenext-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:data-schemas && npm run build:api && npm run build:data-provider && npx playwright install chromium
    startCommand: npm run backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: 1
      - key: CONSOLE_JSON
        value: true
      - key: DEBUG_LOGGING
        value: false
      # Disable Redis (use in-memory cache for free tier)
      - key: USE_REDIS
        value: false
      # Disable MeiliSearch (50-100MB savings - not needed on free tier)
      - key: SEARCH
        value: false
      - key: MEILI_NO_SYNC
        value: true
      # MongoDB connection pool limits (20-30MB savings)
      - key: MONGO_MAX_POOL_SIZE
        value: 5
      - key: MONGO_MIN_POOL_SIZE
        value: 1
      - key: MONGO_MAX_IDLE_TIME_MS
        value: 30000
      # Disable telemetry to avoid OpenTelemetry errors
      - key: NODE_OPTIONS
        value: --max-old-space-size=380 --optimize-for-size
      - key: TELEMETRY_ENABLED
        value: false
      - key: LANGFUSE_ENABLED
        value: false
      # These will need to be set in Render dashboard
      - key: MONGO_URI
        sync: false
      - key: DOMAIN_CLIENT
        sync: false
      - key: DOMAIN_SERVER
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CREDS_KEY
        sync: false
      - key: CREDS_IV
        sync: false
      - key: SESSION_EXPIRY
        value: 900000
      - key: REFRESH_TOKEN_EXPIRY
        value: 604800000
      # Web Search - hardcoded in librechat.yaml, no env vars needed
      # Anthropic API Key
      - key: ANTHROPIC_API_KEY
        value: user_provided
      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: /oauth/google/callback
      # Google Drive
      - key: GOOGLE_DRIVE_ENABLED
        value: true
      - key: GOOGLE_DRIVE_FOLDER_NAME
        value: EnableNext Outputs
    healthCheckPath: /api/health
