# Enable Configuration
# This file controls the behavior of Enable features

version: 1.2.1

# Cache settings
cache: true

# Interface Configuration
interface:
  # Enable web search feature (no API key needed with DuckDuckGo)
  webSearch: true
  # Enable all standard interface features
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    share: false
    public: false

# Web Search Configuration (now using Tavily via MCP)
# No config needed - handled by MCP integration

# Agents Configuration - All tools enabled
endpoints:
  agents:
    capabilities:
      - execute_code
      - file_search
      - web_search
      - actions
      - tools
      - artifacts
    recursionLimit: 25
    maxRecursionLimit: 50
    # Builder interface
    disableBuilder: false
    # CRITICAL: Append current date/time to EVERY agent run
    assistant:
      append_current_datetime: true
  
  # Anthropic Configuration - Full model selection
  anthropic:
    streamRate: 20
    titleModel: claude-sonnet-4-6
    models:
      - claude-sonnet-4-6
      - claude-haiku-4-5
    # Append current date/time to system prompt for accurate date awareness
    assistant:
      append_current_datetime: true

# File Upload Configuration
# Enable comprehensive document support including Office files
fileConfig:
  # Server-side file size limit (in MB)
  serverFileSizeLimit: 20
  
  # OCR Configuration - images and PDF only (Office docs load heavy libs)
  ocr:
    supportedMimeTypes:
      - "^image/(jpeg|gif|png|webp|heic|heif)$"
      - "^application/pdf$"
  
  # Text extraction configuration
  text:
    # Accept all standard document formats for text extraction
    supportedMimeTypes:
      - "^[\\w.-]+/[\\w.-]+$"
  
  # Endpoint-specific configurations
  endpoints:
    # Default configuration for all endpoints
    default:
      fileLimit: 10
      fileSizeLimit: 20  # MB per file
      totalSizeLimit: 100  # MB total
      # Comprehensive MIME type support
      supportedMimeTypes:
        # Images
        - "^image/(jpeg|gif|png|webp|heic|heif|svg|svg\\+xml)$"
        # Documents - Office formats
        - "^application/vnd\\.openxmlformats-officedocument\\.(wordprocessingml\\.document|presentationml\\.presentation|spreadsheetml\\.sheet)$"
        - "^application/vnd\\.ms-(excel|word|powerpoint)$"
        - "^application/(msexcel|x-msexcel|x-ms-excel|x-excel|x-dos_ms_excel|xls|x-xls)$"
        - "^application/msword$"
        # Documents - PDFs and text
        - "^application/pdf$"
        - "^text/(plain|markdown|html|css|javascript|csv|xml|vtt)$"
        - "^text/(x-c|x-c\\+\\+|x-java|x-php|x-python|x-script\\.python|x-ruby|x-tex)$"
        # Programming and data formats
        - "^application/(json|typescript|sql|yaml|xml|zip|x-tar|x-sh|csv|vnd\\.coffeescript|epub\\+zip)$"
        # Audio (for STT)
        - "^audio/(mp3|mpeg|mpeg3|wav|wave|x-wav|ogg|vorbis|mp4|m4a|x-m4a|flac|x-flac|webm|aac|wma|opus)$"
        # Video
        - "^video/(mp4|avi|mov|wmv|flv|webm|mkv|m4v|3gp|ogv)$"
    
    # Agents endpoint
    agents:
      fileLimit: 5
      fileSizeLimit: 10  # MB per file
      totalSizeLimit: 50  # MB total
      supportedMimeTypes:
        - "^image/(jpeg|gif|png|webp|heic|heif|svg|svg\\+xml)$"
        - "^application/vnd\\.openxmlformats-officedocument\\.(wordprocessingml\\.document|presentationml\\.presentation|spreadsheetml\\.sheet)$"
        - "^application/vnd\\.ms-(excel|word|powerpoint)$"
        - "^application/(msexcel|x-msexcel|x-ms-excel|x-excel|x-dos_ms_excel|xls|x-xls)$"
        - "^application/msword$"
        - "^application/pdf$"
        - "^text/.*$"
        - "^application/(json|typescript|sql|yaml|xml|zip|x-tar|x-sh|csv|vnd\\.coffeescript|epub\\+zip)$"
        - "^audio/(mp3|mpeg|mpeg3|wav|wave|x-wav|ogg|vorbis|mp4|m4a|x-m4a|flac|x-flac|webm|aac|wma|opus)$"
        - "^video/(mp4|avi|mov|wmv|flv|webm|mkv|m4v|3gp|ogv)$"