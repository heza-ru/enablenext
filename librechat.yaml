# Enable Configuration
# This file controls the behavior of Enable features

version: 1.2.1

# Cache settings
cache: true

# Interface Configuration
interface:
  # Enable web search feature (no API key needed with DuckDuckGo)
  webSearch: true
  # Enable all standard interface features
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    share: false
    public: false

# Model Specs — Presentation Creator preset available in normal chat
modelSpecs:
  enforce: false
  prioritize: false
  list:
    - name: presentation-creator
      label: "Presentation Creator"
      description: "Generates pixel-perfect HTML slide decks rendered inline. Ask for any presentation topic."
      artifacts: true
      preset:
        endpoint: anthropic
        model: claude-sonnet-4-6
        modelLabel: "Presentation Creator"
        greeting: "Tell me your presentation topic and I'll build a pixel-perfect slide deck rendered right here."
        promptPrefix: |
          You are a world-class presentation designer. When the user asks for a presentation, slides, or a deck, you MUST output a single complete self-contained HTML artifact.

          RULES:
          - Output type must be `html` artifact — renders directly in the side panel
          - Everything inline: no external CDN links, no iframes. Google Fonts @import is allowed.
          - Each slide serves ONE idea. Use whitespace as a design tool.
          - Include: title slide, agenda, content slides, closing slide.

          SLIDE STRUCTURE (use this exact HTML skeleton):
          <!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>TITLE</title><style>/* all CSS here */</style></head><body><div class="deck"><!-- slides --></div><div class="progress-bar"><div class="fill"></div></div><div class="counter">1/N</div><script>/* nav logic */</script></body></html>

          BRAND — Strict Whatfix palette only — no invented colors. Default theme: DARK (bg #25223B Ink 700, surface #35324A, text #FFFFFF). Orange #FF6B18 is ACCENT only — headlines, stats, CTAs, lines — NEVER a full slide background. Section dividers: gradient #FF6B18→#872345. Font: DM Sans from Google Fonts (brand-approved web substitute for Aeonik). Sentence case headlines always.
          TYPOGRAPHY — Headlines bold 3–5rem clamped to text length, max 8 words. Body max 3 bullets, 10 words each.
          NAVIGATION — Arrow keys + Space to advance, left arrow to go back, F for fullscreen, N to toggle speaker notes.
          TRANSITIONS — CSS transform+opacity 400ms ease between slides.
          DATA SLIDES — Render real CSS/SVG charts, never print raw numbers.
          QUOTES — Large pull quote with decorative quotation mark and attribution.

          After generating, ask: (1) adjust theme/colors? (2) add/remove slides? (3) speaker notes?

          For non-presentation requests, behave as a normal helpful assistant.

# Web Search Configuration (now using Tavily via MCP)
# No config needed - handled by MCP integration

# Agents Configuration - All tools enabled
endpoints:
  agents:
    # Enable all agent capabilities including web search
    capabilities:
      - execute_code
      - file_search
      - web_search
      - actions
      - tools
      - artifacts
      - ocr  # Enable OCR for document processing (docx, xlsx, pptx, pdf)
      - context  # Enable context extraction from documents
    # Recursion settings
    recursionLimit: 50
    maxRecursionLimit: 100
    # Builder interface
    disableBuilder: false
    # CRITICAL: Append current date/time to EVERY agent run
    assistant:
      append_current_datetime: true
  
  # Anthropic Configuration - Full model selection
  anthropic:
    streamRate: 20
    titleModel: claude-sonnet-4-6
    models:
      # Claude 4.6 family (latest)
      - claude-sonnet-4-6
      - claude-opus-4-6
      # Claude 4.5 family
      - claude-haiku-4-5
      - claude-sonnet-4-5
      - claude-opus-4-5
      # Claude 4 family
      - claude-sonnet-4
      - claude-opus-4
      # Claude 3.5 family
      - claude-3-5-sonnet-20241022
      - claude-3-5-sonnet-20240620
      - claude-3-5-haiku-20241022
      # Claude 3 family
      - claude-3-opus-20240229
      - claude-3-sonnet-20240229
      - claude-3-haiku-20240307
    # Append current date/time to system prompt for accurate date awareness
    assistant:
      append_current_datetime: true

# File Upload Configuration
# Enable comprehensive document support including Office files
fileConfig:
  # Server-side file size limit (in MB)
  serverFileSizeLimit: 100
  
  # OCR Configuration for document processing
  ocr:
    # Supported MIME types for OCR processing
    supportedMimeTypes:
      - "^image/(jpeg|gif|png|webp|heic|heif)$"
      - "^application/pdf$"
      - "^application/vnd\\.openxmlformats-officedocument\\.(wordprocessingml\\.document|presentationml\\.presentation|spreadsheetml\\.sheet)$"
      - "^application/vnd\\.ms-(word|powerpoint|excel)$"
      - "^application/epub\\+zip$"
  
  # Text extraction configuration
  text:
    # Accept all standard document formats for text extraction
    supportedMimeTypes:
      - "^[\\w.-]+/[\\w.-]+$"
  
  # Endpoint-specific configurations
  endpoints:
    # Default configuration for all endpoints
    default:
      fileLimit: 10
      fileSizeLimit: 20  # MB per file
      totalSizeLimit: 100  # MB total
      # Comprehensive MIME type support
      supportedMimeTypes:
        # Images
        - "^image/(jpeg|gif|png|webp|heic|heif|svg|svg\\+xml)$"
        # Documents - Office formats
        - "^application/vnd\\.openxmlformats-officedocument\\.(wordprocessingml\\.document|presentationml\\.presentation|spreadsheetml\\.sheet)$"
        - "^application/vnd\\.ms-(excel|word|powerpoint)$"
        - "^application/(msexcel|x-msexcel|x-ms-excel|x-excel|x-dos_ms_excel|xls|x-xls)$"
        - "^application/msword$"
        # Documents - PDFs and text
        - "^application/pdf$"
        - "^text/(plain|markdown|html|css|javascript|csv|xml|vtt)$"
        - "^text/(x-c|x-c\\+\\+|x-java|x-php|x-python|x-script\\.python|x-ruby|x-tex)$"
        # Programming and data formats
        - "^application/(json|typescript|sql|yaml|xml|zip|x-tar|x-sh|csv|vnd\\.coffeescript|epub\\+zip)$"
        # Audio (for STT)
        - "^audio/(mp3|mpeg|mpeg3|wav|wave|x-wav|ogg|vorbis|mp4|m4a|x-m4a|flac|x-flac|webm|aac|wma|opus)$"
        # Video
        - "^video/(mp4|avi|mov|wmv|flv|webm|mkv|m4v|3gp|ogv)$"
    
    # Agents endpoint - enable all file types with OCR support
    agents:
      fileLimit: 20
      fileSizeLimit: 50  # MB per file
      totalSizeLimit: 200  # MB total
      supportedMimeTypes:
        - "^image/(jpeg|gif|png|webp|heic|heif|svg|svg\\+xml)$"
        - "^application/vnd\\.openxmlformats-officedocument\\.(wordprocessingml\\.document|presentationml\\.presentation|spreadsheetml\\.sheet)$"
        - "^application/vnd\\.ms-(excel|word|powerpoint)$"
        - "^application/(msexcel|x-msexcel|x-ms-excel|x-excel|x-dos_ms_excel|xls|x-xls)$"
        - "^application/msword$"
        - "^application/pdf$"
        - "^text/.*$"
        - "^application/(json|typescript|sql|yaml|xml|zip|x-tar|x-sh|csv|vnd\\.coffeescript|epub\\+zip)$"
        - "^audio/(mp3|mpeg|mpeg3|wav|wave|x-wav|ogg|vorbis|mp4|m4a|x-m4a|flac|x-flac|webm|aac|wma|opus)$"
        - "^video/(mp4|avi|mov|wmv|flv|webm|mkv|m4v|3gp|ogv)$"